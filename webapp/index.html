<!DOCTYPE html>
<html>
<head>
<title>Medical Test Prep</title>
<link rel="stylesheet" href="css/app.css">
</head>

<body>

<h1 class="main-title">Medical Test Prep</h1>

<div class="portal-container">

  <!-- EMIGS -->
  <div class="dropdown">

    <button class="dropdown-button" onclick="toggleDropdown('emigs-menu', this)">
      Study EMIGS
      <span class="arrow">⌄</span>
    </button>

    <!-- JS will populate this -->
    <div id="emigs-menu" class="dropdown-menu"></div>

  </div>


  <!-- FLS -->
  <div class="dropdown">

    <button class="dropdown-button" onclick="toggleDropdown('fls-menu', this)">
      Study FLS
      <span class="arrow">⌄</span>
    </button>

    <!-- JS will populate this -->
    <div id="fls-menu" class="dropdown-menu"></div>

  </div>


  <!-- Flashcards -->
  <div class="dropdown">

    <button class="dropdown-button" onclick="toggleDropdown('flashcards-menu', this)">
      Study Flashcards
      <span class="arrow">⌄</span>
    </button>

    <div id="flashcards-menu" class="dropdown-menu">
      <a href="#">Coming soon</a>
    </div>

  </div>

</div>

<script src="js/portal.js"></script>

</body>
</html>
