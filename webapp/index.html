<!DOCTYPE html>
<html>

<head>

<title>Medical Test Prep</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/app.css">

</head>

<body>

<div id="portal-content" style="display:none;">

<h1 class="portal-title">Welcome to our Study Portal!</h1>

<p class="portal-subtitle">
Android users, until we finish your app, please enjoy the same materials iOS users currently get
</p>

<div class="portal-container">

<!-- EMIGS -->

<div class="dropdown">

<button class="dropdown-button" onclick="toggleDropdown('emigs-menu', this)">
  <span>Study EMIGS</span>
  <span class="arrow">
    <svg viewBox="0 0 20 20" width="16" height="16" focusable="false" aria-hidden="true">
      <path d="M5.5 7.5L10 12l4.5-4.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
</button>

<div id="emigs-menu" class="dropdown-menu"></div>

</div>


<!-- FLS -->

<div class="dropdown">

<button class="dropdown-button" onclick="toggleDropdown('fls-menu', this)">
  <span>Study FLS</span>
  <span class="arrow">
    <svg viewBox="0 0 20 20" width="16" height="16" focusable="false" aria-hidden="true">
      <path d="M5.5 7.5L10 12l4.5-4.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
</button>

<div id="fls-menu" class="dropdown-menu"></div>

</div>

</div>

</div>

<script type="module" src="js/firebase-init.js"></script>
<script type="module" src="js/portal.js"></script>

</body>

</html>
