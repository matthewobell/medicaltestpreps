<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Medical Test Prep Premium Signup</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#f5f5f5;
padding:30px;
}

.container{
max-width:420px;
margin:auto;
}

h1{
font-size:34px;
font-weight:700;
margin-bottom:30px;
}

.input{
width:100%;
padding:18px;
margin-bottom:18px;
border-radius:20px;
border:1px solid #ccc;
font-size:18px;
box-sizing:border-box;
}

.button{
width:100%;
padding:18px;
border-radius:20px;
background:black;
color:white;
font-size:18px;
font-weight:600;
border:none;
cursor:pointer;
}

.button:hover{
opacity:.9;
}

</style>

</head>

<body>

<div class="container">

<h1>Sign up for Premium</h1>

<input id="name" class="input" placeholder="Name">

<input id="email" class="input" placeholder="Email">

<input id="password" type="password" class="input" placeholder="Password (minimum 8 characters)">

<input id="confirmPassword" type="password" class="input" placeholder="Confirm Password">

<input id="institution" class="input" placeholder="Institution">

<input id="gradYear" class="input" placeholder="Medical School Graduation Year">

<button class="button" onclick="signup()">Sign up</button>

</div>

<script type="module" src="signup.js"></script>

</body>
</html>
