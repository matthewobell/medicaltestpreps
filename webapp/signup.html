<!DOCTYPE html>
<html>
<head>
<title>Medical Test Prep Premium Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/app.css">

<style>

.signup-title{
  font-size:40px;
  font-weight:var(--weight-bold);
  color:var(--color-white);
  text-align:center;
  margin-top:48px;
  margin-bottom:24px;
}

.auth-container{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:100%;
  max-width:520px;
  padding:0 16px;
  box-sizing:border-box;
}

.auth-input{
  width:100%;
  padding:20px 28px;
  margin-bottom:16px;
  border-radius:16px;
  border:none;
  background:var(--color-white);
  font-size:var(--font-body);
  font-weight:var(--weight-bold);
  color:var(--color-text);
  box-sizing:border-box;
  outline:none;
  -webkit-appearance:none;
}

.auth-input::placeholder{
  color:var(--color-text);
  font-weight:var(--weight-bold);
}

.auth-button{
  width:280px;
  padding:20px;
  margin-top:40px;
  margin-bottom:48px;
  border-radius:var(--radius-card);
  border:none;
  background:var(--color-white);
  color:var(--color-text);
  font-size:var(--font-body);
  font-weight:var(--weight-bold);
  cursor:pointer;
}

@media (max-width:480px){

.signup-title{
  font-size:28px;
  margin-top:32px;
}

.auth-input{
  padding:22px 24px;
  font-size:18px;
}

.auth-button{
  width:100%;
  padding:22px;
  font-size:18px;
}

}

</style>
</head>

<body>

<div class="auth-container">

<h1 class="signup-title">Sign up for Premium</h1>

<input id="name" class="auth-input" placeholder="Name" type="text">
<input id="email" class="auth-input" placeholder="Email" type="email">
<input id="password" class="auth-input" placeholder="Password (min. 8 characters)" type="password">
<input id="confirmPassword" class="auth-input" placeholder="Confirm password" type="password">
<input id="institution" class="auth-input" placeholder="Institution" type="text">
<input id="residency" class="auth-input" placeholder="Residency Program" type="text">
<input id="gradYear" class="auth-input" placeholder="Medical School Graduation Date" type="text">

<button id="signup-button" class="auth-button">Create Account</button>

</div>

<script type="module" src="signup.js"></script>

</body>
</html>
